services:
  postgres:
    image: postgres:16-alpine
    container_name: devmonitor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devmonitor
      POSTGRES_PASSWORD: devmonitor_pass
      POSTGRES_DB: devmonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devmonitor_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://devmonitor:devmonitor_pass@postgres:5432/devmonitor
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
